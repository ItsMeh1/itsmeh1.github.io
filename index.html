<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> > ItsMeh1 < </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Smooth Portal Transitions */
        #projectPortal {
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s ease;
        }
        .portal-closed {
            transform: translateY(40px) scale(0.98);
            opacity: 0;
            pointer-events: none;
        }
        .portal-open {
            transform: translateY(0) scale(1);
            opacity: 1;
            pointer-events: auto;
        }

        /* Glassmorphism effects */
        .glass {
            background: rgba(22, 22, 26, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .proxy-active {
            border-color: rgba(234, 179, 8, 0.4) !important;
            box-shadow: 0 0 20px rgba(234, 179, 8, 0.05);
        }

        select option {
            background: #16161a;
            color: #cbd5e1;
        }

        /* Prevent layout shift */
        #prefixSelectorContainer {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            max-width: 0;
            opacity: 0;
            margin: 0;
            display: flex;
            align-items: center;
        }
        #prefixSelectorContainer.visible {
            max-width: 200px;
            opacity: 1;
            margin-left: 0.75rem;
            margin-right: 0.75rem;
        }
    </style>
</head>
<body class="bg-[#0a0a0c] text-slate-200 overflow-x-hidden relative">
    <!-- Background Effects -->
    <div class="fixed inset-0 pointer-events-none overflow-hidden z-0">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-600/10 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-purple-600/10 rounded-full blur-[120px]"></div>
    </div>

    <!-- MAIN HUB -->
    <div id="mainHub" class="relative max-w-6xl mx-auto px-6 py-20 flex flex-col items-center min-h-screen z-10 transition-opacity duration-500">
        <!-- Header -->
        <div class="text-center mb-12">
            <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-white/5 border border-white/10 text-xs font-medium text-slate-400 mb-6 shadow-lg backdrop-blur-md">
                <span class="relative flex h-2 w-2">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-yellow-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-yellow-500"></span>
                </span>
                Only 1 Offline Project!
            </div>
            <h1 class="text-6xl md:text-7xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-br from-white to-slate-500 mb-4">
                ItsMeh1 <span class="text-yellow-400">⚡</span>
            </h1>
            <p class="text-slate-400 max-w-xl mx-auto leading-relaxed">
                Building <span class="text-white font-semibold">Flash</span>: The high-performance web-interception suite.
            </p>
        </div>

        <!-- Unified Command Bar -->
        <div class="w-full max-w-4xl flex flex-col md:flex-row items-stretch gap-3 mb-16 z-10">
            <!-- Search Bar -->
            <div class="relative flex-1">
                <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
                    <i data-lucide="search" class="text-slate-500 w-5 h-5"></i>
                </div>
                <input type="text" id="siteSearch" placeholder="Filter projects..." 
                    class="w-full h-full bg-[#16161a]/80 backdrop-blur-md border border-white/10 rounded-2xl py-4 pl-12 pr-4 text-white placeholder:text-slate-600 focus:outline-none focus:border-white/20 transition-all shadow-xl" 
                    onkeyup="filterApps()">
            </div>

            <!-- Compact Proxy Controller -->
            <div class="flex items-center glass rounded-2xl p-2 px-3 shadow-xl border border-white/10 shrink-0" id="proxyContainer">
                <div class="flex items-center gap-2 pr-3 border-r border-white/5">
                    <i data-lucide="shield" class="w-4 h-4 text-slate-500 transition-all" id="proxyIcon"></i>
                    <span class="text-[11px] font-bold text-slate-400 uppercase tracking-tighter">Proxy</span>
                </div>

                <!-- Animated Prefix Selector -->
                <div id="prefixSelectorContainer" class="overflow-hidden">
                    <select id="proxyPrefix" class="bg-white/5 border border-white/10 rounded-lg py-1.5 px-2 text-[11px] text-slate-300 focus:outline-none transition-colors cursor-pointer w-32" onchange="saveSelection()">
                        <option value="/?.cnn.com">CNN Cloak</option>
                        <option value="/?.classroom.google.com">Classroom</option>
                        <option value="/?.google.com">Google</option>
                        <option value="/?.wikipedia.org">Wiki</option>
                    </select>
                </div>

                <label class="relative inline-flex items-center cursor-pointer ml-2">
                    <input type="checkbox" id="proxyToggle" class="sr-only peer" onchange="updateProxyState(this)">
                    <div class="w-10 h-5 bg-white/10 rounded-full peer peer-checked:after:translate-x-5 after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-slate-400 after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-yellow-500 peer-checked:after:bg-white transition-all"></div>
                </label>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 w-full max-w-5xl" id="appGrid"></div>
    </div>

    <!-- PROJECT PORTAL -->
    <div id="projectPortal" class="fixed inset-0 z-[100] portal-closed bg-[#0a0a0c] overflow-y-auto no-scrollbar">
        <div class="sticky top-0 z-[110] p-6 flex justify-between items-center bg-[#0a0a0c]/90 backdrop-blur-xl border-b border-white/5">
            <button onclick="closePortal()" class="flex items-center gap-2 px-4 py-2 rounded-xl bg-white/5 hover:bg-white/10 border border-white/10 text-slate-300 transition-all font-semibold">
                <i data-lucide="arrow-left" class="w-4 h-4"></i> Back
            </button>
            <div id="portalProxyStatus" class="hidden sm:flex items-center gap-2 text-[10px] font-black text-yellow-500 bg-yellow-500/10 px-4 py-2 rounded-full border border-yellow-500/20 tracking-widest">
                <i data-lucide="shield-check" class="w-4 h-4"></i> TUNNEL: <span id="activePrefixDisplay" class="text-white">NONE</span>
            </div>
        </div>

        <div class="max-w-5xl mx-auto px-6 py-12">
            <div class="flex flex-col md:flex-row items-start gap-8 mb-16">
                <div id="portalIconContainer" class="w-24 h-24 rounded-3xl flex items-center justify-center border border-white/10 shrink-0 shadow-2xl relative">
                    <i id="portalIcon" data-lucide="globe" class="w-12 h-12 relative z-10"></i>
                </div>
                <div class="space-y-4">
                    <div id="portalTag" class="inline-block px-3 py-1 rounded-md text-[10px] font-black uppercase tracking-widest border">STATUS</div>
                    <h2 id="portalTitle" class="text-5xl md:text-6xl font-black text-white tracking-tighter">Project Name</h2>
                    <p id="portalShortDesc" class="text-lg text-slate-400 font-medium"></p>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-2 space-y-10">
                    <section class="glass p-8 rounded-3xl">
                        <h3 class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-6">Overview</h3>
                        <p id="portalLongDesc" class="text-slate-300 leading-relaxed text-lg"></p>
                    </section>
                    <section>
                        <div id="portalFeatures" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
                    </section>
                </div>

                <div class="space-y-6">
                    <div class="bg-[#121216] border border-white/10 rounded-3xl p-6 space-y-4 shadow-xl">
                        <a id="portalLaunchBtn" href="#" target="_blank" class="flex items-center justify-center gap-3 w-full py-4 rounded-2xl bg-white text-black font-black text-sm hover:scale-[1.02] active:scale-95 transition-all">
                            Initialize <i data-lucide="external-link" class="w-4 h-4"></i>
                        </a>
                    </div>
                    <div class="bg-[#121216] border border-white/10 rounded-3xl p-6 shadow-xl">
                        <h3 class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-4">Runtime Specs</h3>
                        <div class="space-y-3" id="portalRuntime"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let isProxyMode = false;
        let selectedPrefix = "/?.cnn.com";

        const projects = [
            {
                id: 'lite',
                title: 'Flash Lite',
                tag: 'STABLE',
                tagStyle: 'text-blue-400 bg-blue-400/10 border-blue-400/20',
                icon: 'zap',
                iconColor: 'text-blue-400',
                iconBg: 'bg-blue-500/10',
                shortDesc: 'The fastest web-interception proxy. Version 6.3.',
                longDesc: 'Flash Lite is optimized for speed and stealth. It uses a lightweight Scramjet core to bypass restrictions instantly.',
                link: 'https://itsmeh1.github.io/Flash-Lite',
                repo: 'itsmeh1/Flash-Lite',
                features: ['Zero-latency engine', 'Minimalist Shell', 'Auto-clean cache'],
                runtime: { engine: 'Scramjet', version: '6.3.0', environment: 'GitHub' },
                isAvailable: true
            },
            {
                id: 'plus',
                title: 'Flash Plus',
                tag: "BETA",
                tagStyle: 'text-yellow-400 bg-yellow-400/10 border-yellow-400/20',
                icon: 'shield-check',
                iconColor: 'text-yellow-400',
                iconBg: 'bg-yellow-500/10',
                shortDesc: "Premium-grade multi-threaded bypass system.",
                longDesc: 'The apex of stealth technology. Flash Plus features dynamic IP rotation and multi-tab sandboxing for maximum reliability.',
                link: '#',
                repo: 'itsmeh1/Flash-Plus',
                features: ['Multi-Threading', 'IP Rotation', 'Deep Packet Cloaking'],
                runtime: { engine: 'Pro-V2', version: 'BETA', environment: 'Secure' },
                isAvailable: false
            },
            {
                id: 'legacy',
                title: 'Flash Legacy',
                tag: "ARCHIVED",
                tagStyle: 'text-slate-400 bg-slate-400/10 border-slate-400/20',
                icon: 'history',
                iconColor: 'text-slate-400',
                iconBg: 'bg-slate-500/10',
                shortDesc: "The original foundation of the Flash ecosystem.",
                longDesc: 'No longer receiving updates but remains available for research and testing purposes.',
                link: 'https://itsmeh1.github.io/Flash-Legacy',
                repo: 'itsmeh1/Flash-Legacy',
                features: ['Classic Tunneling', 'Static Layout', 'Legacy Support'],
                runtime: { engine: 'Classic', version: '1.0.0', environment: 'Static' },
                isAvailable: true
            }
        ];

        function saveSelection() {
            selectedPrefix = document.getElementById('proxyPrefix').value;
            const portal = document.getElementById('projectPortal');
            if (portal.classList.contains('portal-open')) {
                const currentTitle = document.getElementById('portalTitle').innerText;
                const project = projects.find(p => p.title === currentTitle);
                if(project) updatePortalLaunchButton(project);
            }
        }

        function updateProxyState(checkbox) {
            isProxyMode = checkbox.checked;
            const icon = document.getElementById('proxyIcon');
            const container = document.getElementById('proxyContainer');
            const selector = document.getElementById('prefixSelectorContainer');

            if(isProxyMode) {
                icon.classList.replace('text-slate-500', 'text-yellow-400');
                container.classList.add('proxy-active');
                selector.classList.add('visible');
            } else {
                icon.classList.replace('text-yellow-400', 'text-slate-500');
                container.classList.remove('proxy-active');
                selector.classList.remove('visible');
            }
        }

        function renderCards() {
            const grid = document.getElementById('appGrid');
            grid.innerHTML = '';
            projects.forEach(proj => {
                const card = document.createElement('div');
                card.className = 'app-card group relative bg-[#16161a] border border-white/5 rounded-3xl p-6 hover:border-white/10 transition-all duration-300 cursor-pointer';
                card.onclick = () => openPortal(proj.id);
                card.innerHTML = `
                    <div class="flex items-start gap-4">
                        <div class="w-12 h-12 rounded-2xl ${proj.iconBg} flex items-center justify-center border border-white/5">
                            <i data-lucide="${proj.icon}" class="${proj.iconColor} w-6 h-6"></i>
                        </div>
                        <div class="flex-1">
                            <span class="${proj.tagStyle} text-[8px] font-black px-2 py-0.5 rounded tracking-widest mb-1 block w-fit border">${proj.tag}</span>
                            <h3 class="text-lg font-bold text-white group-hover:text-yellow-400 transition-colors">${proj.title}</h3>
                            <p class="text-xs text-slate-500 line-clamp-2">${proj.shortDesc}</p>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
            lucide.createIcons();
        }

        function filterApps() {
            const query = document.getElementById('siteSearch').value.toLowerCase();
            const cards = document.querySelectorAll('.app-card');
            cards.forEach((card, index) => {
                const title = projects[index].title.toLowerCase();
                if (title.includes(query)) card.style.display = 'block';
                else card.style.display = 'none';
            });
        }

        function updatePortalLaunchButton(project) {
            const btn = document.getElementById('portalLaunchBtn');
            const proxyLabel = document.getElementById('portalProxyStatus');
            const prefixDisplay = document.getElementById('activePrefixDisplay');
            
            if (project.isAvailable) {
                btn.href = isProxyMode ? project.link + selectedPrefix : project.link;
                btn.className = "flex items-center justify-center gap-3 w-full py-4 rounded-2xl bg-white text-black font-black text-sm hover:scale-[1.01] transition-all";
                btn.innerHTML = `Open Project <i data-lucide="external-link" class="w-4 h-4"></i>`;
                
                if(isProxyMode) {
                    proxyLabel.classList.remove('hidden');
                    prefixDisplay.innerText = selectedPrefix.replace('/?.', '').toUpperCase();
                } else {
                    proxyLabel.classList.add('hidden');
                }
            } else {
                btn.href = "#";
                btn.className = "flex items-center justify-center gap-3 w-full py-4 rounded-2xl bg-white/5 text-slate-600 font-black text-sm cursor-not-allowed border border-white/5";
                btn.innerHTML = `Not Available <i data-lucide="lock" class="w-4 h-4"></i>`;
                proxyLabel.classList.add('hidden');
            }
            lucide.createIcons({ root: btn });
        }

        function openPortal(projectId) {
            const project = projects.find(p => p.id === projectId);
            if(!project) return;

            document.getElementById('portalTitle').innerText = project.title;
            document.getElementById('portalShortDesc').innerText = project.shortDesc;
            document.getElementById('portalLongDesc').innerText = project.longDesc;
            
            const tag = document.getElementById('portalTag');
            tag.innerText = project.tag;
            tag.className = `inline-block px-3 py-1 rounded-md text-[10px] font-black uppercase tracking-widest border ${project.tagStyle}`;

            document.getElementById('portalIconContainer').innerHTML = `<i data-lucide="${project.icon}" class="${project.iconColor} w-10 h-10"></i>`;

            document.getElementById('portalFeatures').innerHTML = project.features.map(f => `
                <div class="flex items-center gap-3 p-4 glass rounded-2xl text-sm border-white/5">
                    <i data-lucide="check" class="w-4 h-4 text-green-500"></i>
                    <span class="text-slate-300 font-medium">${f}</span>
                </div>
            `).join('');

            document.getElementById('portalRuntime').innerHTML = Object.entries(project.runtime).map(([key, value]) => `
                <div class="flex justify-between items-center text-xs">
                    <span class="text-slate-500 font-bold uppercase">${key}</span>
                    <span class="text-slate-200 font-mono">${value}</span>
                </div>
            `).join('');

            updatePortalLaunchButton(project);
            document.getElementById('projectPortal').classList.replace('portal-closed', 'portal-open');
            document.body.style.overflow = 'hidden';
            lucide.createIcons({ root: document.getElementById('projectPortal') });
        }

        function closePortal() {
            document.getElementById('projectPortal').classList.replace('portal-open', 'portal-closed');
            document.body.style.overflow = '';
        }

        window.onload = renderCards;
    </script>
</body>
</html>
